name: Build Inventoria + APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build

      - name: Upload website build
        uses: actions/upload-artifact@v4
        with:
          name: inventoria-website
          path: build/

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap
        run: bubblewrap init --manifest=https://inventoria-suite--mabelamoasi996.replit.app/manifest.json

      - name: Build APK (auto-answer No)
        run: echo "No" | bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: inventoria-apk
          path: app/build/outputs/apk/release/app-release.apk